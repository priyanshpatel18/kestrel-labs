[toolchain]
anchor_version = "0.32.1"
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.devnet]
kestrel = "ELJUMkFGjCAyLu7YWsYN9k8nk3GMtDG1P6BYqBtzVFvd"

[programs.localnet]
kestrel = "ELJUMkFGjCAyLu7YWsYN9k8nk3GMtDG1P6BYqBtzVFvd"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
deploy-devnet = "anchor deploy --provider.cluster devnet -- --max-len 1048576"
scheduler-dev = "pnpm --filter @kestrel/scheduler dev"
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
test-er = "RUN_ER_TESTS=1 pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
